name: Deploy PasswordManagerApi to Plesk

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # 1. ADIM: appsettings.json verilerini GitHub Secrets ile güvenli žekilde dešižtirme
    - name: Update AppSettings
      uses: microsoft/variable-substitution@v1
      with:
        files: 'PasswordManager/WebApi/appsettings.json'
      env:
        ConnectionStrings.PasswordManagerDb: ${{ secrets.DB_CONNECTION }}
        TokenOptions.SecurityKey: ${{ secrets.JWT_SECURITY_KEY }}
        SaltSecret: ${{ secrets.SALT_SECRET }}

    # 2. ADIM: Publish (Build) alma
    - name: Dotnet Publish
      run: dotnet publish PasswordManager/WebApi/WebApi.csproj -c Release -o ./publish

    # 3. ADIM: FTP sync state'i cache'den yükle (dešižen dosyalarż tespit iēin)
    - name: Load FTP sync state from cache
      uses: actions/cache@v3
      with:
        path: .ftp-deploy-sync-state.json
        key: ftp-deploy-state-${{ github.repository }}

    # 4. ADIM: Uygulamayż durdurmak iēin app_offline.htm olužtur
    - name: Create app_offline.htm
      run: |
        mkdir -p ./app_offline_temp
        echo "<html><head><meta charset='utf-8'></head><body><div style='text-align:center;margin-top:100px;'><h1>Sistem Guncelleniyor...</h1><p>Lutfen bekleyiniz.</p></div></body></html>" > ./app_offline_temp/app_offline.htm

    # 5. ADIM: Önce app_offline.htm'i gönder (Uygulamayż durdur)
    - name: Upload app_offline.htm to stop the application
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./app_offline_temp/
        server-dir: passwordapi.buraktemelkaya.com/

    # 6. ADIM: Uygulamanżn durmasż iēin bekle
    - name: Wait for application to stop
      run: sleep 10

    # 7. ADIM: Sadece dešižen dosyalarż FTP ile gönder (INCREMENTAL DEPLOY)
    - name: FTP Deploy Changed Files Only
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/
        server-dir: passwordapi.buraktemelkaya.com/
        state-name: .ftp-deploy-sync-state.json
        dry-run: false
        dangerous-clean-slate: false

    # 8. ADIM: app_offline.htm'i sil (Uygulamayż yeniden bažlat)
    - name: Delete app_offline.htm via FTP
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        lftp -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }} <<EOF
        cd passwordapi.buraktemelkaya.com
        rm -f app_offline.htm
        bye
        EOF