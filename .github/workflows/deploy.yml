name: Deploy PasswordManagerApi to Plesk

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # 1. ADIM: appsettings.json verilerini GitHub Secrets ile güvenli ţekilde deđiţtirme
    - name: Update AppSettings
      uses: microsoft/variable-substitution@v1
      with:
        files: 'PasswordManager/WebApi/appsettings.json'
      env:
        ConnectionStrings.PasswordManagerDb: ${{ secrets.DB_CONNECTION }}
        TokenOptions.SecurityKey: ${{ secrets.JWT_SECURITY_KEY }}
        SaltSecret: ${{ secrets.SALT_SECRET }}

    # 2. ADIM: Publish (Build) alma
    - name: Dotnet Publish
      run: dotnet publish PasswordManager/WebApi/WebApi.csproj -c Release -o ./publish

    # 3. ADIM: LFTP kur
    - name: Install LFTP
      run: sudo apt-get update && sudo apt-get install -y lftp

    # 4. ADIM: app_offline.htm oluţtur ve gönder
    - name: Create and upload app_offline.htm to stop application
      run: |
        mkdir -p ./app_offline_temp
        echo "<html><head><meta charset='utf-8'></head><body><div style='text-align:center;margin-top:100px;'><h1>Sistem Guncelleniyor...</h1><p>Lutfen bekleyiniz.</p></div></body></html>" > ./app_offline_temp/app_offline.htm
        lftp -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }} <<EOF
        set ssl:verify-certificate no
        cd passwordapi.buraktemelkaya.com
        put ./app_offline_temp/app_offline.htm
        bye
        EOF

    # 5. ADIM: Uygulamanýn durmasý için bekle
    - name: Wait for application to stop
      run: sleep 10

    # 6. ADIM: Akýllý Deploy (Sadece boyutu deđiţenler)
    - name: Deploy changed files via LFTP Mirror
      run: |
        lftp -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }} <<EOF
        set ssl:verify-certificate no
        set ftp:ssl-allow yes
        
        # mirror komutunu düzeltiyoruz:
        # --ignore-time: Zaman damgalarýný (timestamp) yok sayar.
        # Boyutlar aynýysa dosyayý 'deđiţmemiţ' kabul eder.
        mirror --reverse \
               --delete \
               --verbose \
               --ignore-time \
               --no-perms \
               --parallel=10 \
               ./publish/ passwordapi.buraktemelkaya.com/
        bye
        EOF

    # 7. ADIM: app_offline.htm'i sil (Uygulamayý yeniden baţlat)
    - name: Delete app_offline.htm to restart application
      run: |
        lftp -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }} <<EOF
        set ssl:verify-certificate no
        cd passwordapi.buraktemelkaya.com
        rm -f app_offline.htm
        bye
        EOF