name: Deploy PasswordManagerApi to Plesk

on:
  push:
    branches: [ "master" ] # Branch adýnýz master olduđu için burayý sabitledik

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # 1. ADIM: appsettings.json verilerini GitHub Secrets ile güvenli ţekilde deđiţtirme
    - name: Update AppSettings
      uses: microsoft/variable-substitution@v1
      with:
        files: 'projects/passwordManagerApi/WebAPI/appsettings.json'
      env:
        ConnectionStrings.PasswordManagerDb: ${{ secrets.DB_CONNECTION }}
        TokenOptions.SecurityKey: ${{ secrets.JWT_SECURITY_KEY }}
        SaltSecret: ${{ secrets.SALT_SECRET }}

    # 2. ADIM: Publish (Build) alma
    - name: Dotnet Publish
      run: dotnet publish projects/passwordManagerApi/WebAPI/WebAPI.csproj -c Release -o ./publish

    # 3. ADIM: Uygulamayý durdurmak için app_offline.htm oluţtur (DLL kilidini açar)
    - name: Create app_offline.htm
      run: echo "<html><head><meta charset='utf-8'></head><body><div style='text-align:center;margin-top:100px;'><h1>Sistem Guncelleniyor...</h1><p>Lutfen bekleyiniz.</p></div></body></html>" > ./publish/app_offline.htm

    # 4. ADIM: FTP ile tüm dosyalarý Plesk'e gönderme
    - name: FTP Deploy
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/
        server-dir: passwordapi.buraktemelkaya.com/ 
        delete-destination-redundant: false # Mevcut loglarý veya özel dosyalarý silmemesi için false