name: Deploy ASP.NET Core API to Plesk (Safe Mode)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Kendi versiyonunuza göre (8.0, 7.0 vb.) güncelleyin

    # 1. ADIM: appsettings.json içindeki gizli bilgileri GitHub Secrets ile deđiţtirme
    - name: AppSettings Deđiţkenlerini Enjekte Et
      uses: microsoft/variable-substitution@v1
      with:
        files: '**/appsettings.json' 
      env:
        ConnectionStrings.PasswordManagerDb: ${{ secrets.DB_CONNECTION }}
        TokenOptions.SecurityKey: ${{ secrets.JWT_SECURITY_KEY }}
        SaltSecret: ${{ secrets.SALT_SECRET }}

    # 2. ADIM: Projeyi derle (Publish)
    - name: Dotnet Publish
      run: dotnet publish -c Release -o ./publish

    # 3. ADIM: Uygulamayý durdurmak için app_offline.htm oluţtur
    - name: Create app_offline.htm
      run: |
        echo "<html><head><meta charset='utf-8'></head><body><div style='text-align:center;margin-top:100px;'><h1>Sistem Güncelleniyor</h1><p>Lütfen birkaç dakika sonra tekrar deneyiniz.</p></div></body></html>" > ./publish/app_offline.htm

    # 4. ADIM: Önce SADECE app_offline.htm dosyasýný gönder (Uygulamayý durdurur ve DLL kilitlerini açar)
    - name: Stop Application
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/
        server-dir: passwordapi.buraktemelkaya.com/
        extract-path: 'app_offline.htm' # Sadece bu dosyaya odaklanmasý için

    # 5. ADIM: Tüm dosyalarý (DLL'ler dahil) gönder
    - name: Sync All Files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/
        server-dir: passwordapi.buraktemelkaya.com/
        delete-destination-redundant: false # Mevcut dosyalarý temizlemek isterseniz true yapýn

    # 6. ADIM: app_offline.htm dosyasýný sunucudan sil (Uygulamayý tekrar baţlatýr)
    # FTP-Deploy-Action ile dosya silmek için 'exclude' mekanizmasýný kullanýyoruz
    - name: Start Application (Remove app_offline.htm)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./empty_dir/ # Boţ bir klasör gösteriyoruz
        server-dir: passwordapi.buraktemelkaya.com/
        delete-destination-redundant: true
        exclude: |
          **
          !app_offline.htm